<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <rect width="600" height="800" fill="#9B9B93"/>
  <!-- Subtle background texture -->
  <rect width="600" height="800" fill="url(#grain)" opacity="0.3"/>
  <defs>
    <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" x="0" y="0" fill="#39393A" opacity="0.4"/>
      <rect width="1" height="1" x="2" y="2" fill="#39393A" opacity="0.2"/>
    </pattern>
  </defs>
  <!-- Monogram circle -->
  <circle cx="300" cy="340" r="110" fill="#39393A" opacity="0.25"/>
  <!-- WC monogram -->
  <text
    x="300"
    y="380"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="96"
    font-weight="700"
    fill="#39393A"
    opacity="0.7"
    letter-spacing="-4">WC</text>
  <!-- Label -->
  <text
    x="300"
    y="580"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="18"
    fill="#39393A"
    opacity="0.6"
    letter-spacing="4">[ YOUR PHOTO ]</text>
</svg>
