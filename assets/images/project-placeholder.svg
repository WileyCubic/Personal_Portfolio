<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#9B9B93"/>
  <defs>
    <pattern id="grain2" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" x="0" y="0" fill="#39393A" opacity="0.3"/>
      <rect width="1" height="1" x="2" y="2" fill="#39393A" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grain2)" opacity="0.4"/>
  <!-- Simple chart icon -->
  <g opacity="0.4" transform="translate(340, 160)">
    <rect x="0" y="40" width="20" height="40" fill="#39393A" rx="2"/>
    <rect x="30" y="20" width="20" height="60" fill="#39393A" rx="2"/>
    <rect x="60" y="10" width="20" height="70" fill="#39393A" rx="2"/>
    <rect x="90" y="30" width="20" height="50" fill="#39393A" rx="2"/>
    <line x1="-5" y1="80" x2="120" y2="80" stroke="#39393A" stroke-width="2"/>
  </g>
  <!-- Label -->
  <text
    x="400"
    y="310"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="14"
    fill="#39393A"
    opacity="0.55"
    letter-spacing="4">[ PROJECT IMAGE ]</text>
</svg>
